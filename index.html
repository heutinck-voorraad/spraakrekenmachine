<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Prijzen optellen – Sas' Mini-Kwekerij</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --groen: #3a6b3a; --lichtgroen: #e8f0e8; --accent: #7baa5a;
  --tekst: #1e2d1e; --zacht: #6b826b; --rood: #b94a48; --wit: #f7faf7;
}
body {
  font-family: 'Segoe UI', system-ui, sans-serif;
  background: var(--lichtgroen); color: var(--tekst);
  min-height: 100dvh; display: flex; flex-direction: column;
  align-items: center; padding: 1rem 1rem 2rem; gap: 0.9rem;
}
header { text-align: center; }
header h1 { font-size: 1.15rem; font-weight: 700; color: var(--groen); }
header p  { font-size: 0.78rem; color: var(--zacht); margin-top: 0.1rem; }

/* Totaal */
.totaal-box {
  background: var(--groen); color: white; border-radius: 1.2rem;
  padding: 1.1rem 2rem; text-align: center; width: 100%; max-width: 360px;
}
.totaal-label { font-size: 0.7rem; letter-spacing: 0.08em; text-transform: uppercase; opacity: 0.75; }
.totaal-bedrag { font-size: 2.8rem; font-weight: 800; letter-spacing: -0.02em; line-height: 1.1; margin-top: 0.1rem; }
.totaal-aantal { font-size: 0.75rem; opacity: 0.65; margin-top: 0.2rem; }

/* Knoppen rij */
.knoppen-rij { display: flex; gap: 0.8rem; align-items: center; justify-content: center; }

.mic-btn {
  width: 82px; height: 82px; border-radius: 50%; border: none;
  background: var(--accent); color: white; font-size: 2.2rem; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 4px 18px rgba(58,107,58,0.25);
  transition: transform 0.1s, background 0.2s;
  -webkit-tap-highlight-color: transparent; user-select: none; flex-shrink: 0;
}
.mic-btn:active { transform: scale(0.93); }
.mic-btn.luistert { background: var(--rood); animation: puls 1s ease-in-out infinite; }
.mic-btn.gepauzeerd { background: #c07000; }
@keyframes puls {
  0%,100% { box-shadow: 0 4px 18px rgba(185,74,72,0.3); }
  50%      { box-shadow: 0 4px 32px rgba(185,74,72,0.6); }
}

.zij-knop {
  width: 70px; height: 70px; border: none; border-radius: 1rem; cursor: pointer;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 0.15rem; -webkit-tap-highlight-color: transparent; user-select: none;
  transition: transform 0.1s; flex-shrink: 0;
}
.zij-knop:active { transform: scale(0.93); }
.zij-knop .ico { font-size: 1.5rem; line-height: 1; }
.zij-knop .lbl { font-size: 0.6rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; }
.pauze-knop { background: #fff8e6; color: #c07000; box-shadow: 0 3px 12px rgba(192,112,0,0.15); }
.totaal-knop { background: var(--groen); color: white; box-shadow: 0 3px 12px rgba(58,107,58,0.2); }
.zij-knop:disabled { opacity: 0.35; pointer-events: none; }

.status {
  font-size: 0.82rem; color: var(--zacht); min-height: 1.2em;
  text-align: center; max-width: 340px;
}
.status.actief { color: var(--rood); font-weight: 600; }

/* Handmatig */
.handmatig { display: flex; gap: 0.5rem; width: 100%; max-width: 360px; }
.handmatig input {
  flex: 1; padding: 0.65rem 0.9rem; border: 2px solid #c8d8c8;
  border-radius: 0.7rem; font-size: 1.1rem; background: white;
  color: var(--tekst); outline: none; transition: border-color 0.2s;
}
.handmatig input:focus { border-color: var(--accent); }
.handmatig button {
  padding: 0.65rem 1.1rem; background: var(--groen); color: white;
  border: none; border-radius: 0.7rem; font-size: 1.1rem; font-weight: 700; cursor: pointer;
}

/* Lijst */
.lijst-wrap { width: 100%; max-width: 360px; flex: 1; }
.lijst-header {
  display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.4rem;
}
.lijst-header span { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.07em; color: var(--zacht); font-weight: 600; }
.wis-alles { font-size: 0.72rem; color: var(--rood); background: none; border: none; cursor: pointer; font-weight: 600; }
.lijst { list-style: none; display: flex; flex-direction: column; gap: 0.3rem; max-height: 40vh; overflow-y: auto; }
.lijst li {
  background: white; border-radius: 0.65rem; padding: 0.5rem 0.75rem;
  display: flex; align-items: center; font-size: 0.92rem;
  box-shadow: 0 1px 4px rgba(0,0,0,0.06); gap: 0.3rem;
}
.li-omschrijving { flex: 1; color: var(--zacht); font-size: 0.85rem; }
.li-bedrag { font-weight: 700; color: var(--groen); white-space: nowrap; }
.li-del { background: none; border: none; color: #bbb; font-size: 1rem; cursor: pointer; padding: 0 0.1rem; margin-left: 0.3rem; }
.li-del:active { color: var(--rood); }
.leeg-msg { text-align: center; color: var(--zacht); font-size: 0.85rem; padding: 1rem 0; }

/* Geen spraak */
.geen-spraak {
  display: none; background: #fff3cd; border: 1px solid #ffc107;
  border-radius: 0.6rem; padding: 0.6rem 0.9rem; font-size: 0.8rem;
  color: #856404; max-width: 360px; width: 100%; text-align: center;
}

/* Overlay */
.overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(30,45,30,0.88); z-index: 100;
  flex-direction: column; align-items: center; justify-content: center; padding: 1.5rem;
}
.overlay-box {
  background: white; border-radius: 1.5rem; padding: 2rem;
  text-align: center; width: 100%; max-width: 340px;
  max-height: 90dvh; display: flex; flex-direction: column;
  box-shadow: 0 8px 40px rgba(0,0,0,0.3);
}
.overlay-label { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--zacht); }
.overlay-bedrag { font-size: 3rem; font-weight: 800; color: var(--groen); letter-spacing: -0.02em; line-height: 1.1; }
.overlay-planten { font-size: 1rem; font-weight: 600; color: var(--zacht); margin: 0.2rem 0 0.8rem; }
.overlay-rekensom {
  border-top: 1px solid var(--lichtgroen); padding-top: 0.8rem;
  overflow-y: auto; flex: 1; text-align: left;
}
.overlay-rekensom div { padding: 0.25rem 0; font-size: 0.95rem; border-bottom: 1px solid #f0f5f0; display: flex; justify-content: space-between; }
.overlay-rekensom div:last-child { border-bottom: none; }
.overlay-sluiten {
  margin-top: 1.2rem; padding: 0.7rem 2rem; background: var(--groen);
  color: white; border: none; border-radius: 0.8rem; font-size: 1rem; font-weight: 700; cursor: pointer;
}
</style>
</head>
<body>

<header>
  <h1>🌿 Prijzen optellen</h1>
  <p>Sas' Mini-Kwekerij Brummen</p>
</header>

<div class="totaal-box">
  <div class="totaal-label">Totaal</div>
  <div class="totaal-bedrag" id="totaalBedrag">€ 0,00</div>
  <div class="totaal-aantal" id="totaalAantal">0 posten ingevoerd</div>
</div>

<div class="knoppen-rij">
  <button class="zij-knop pauze-knop" id="pauzeBtn" onclick="togglePauze()" disabled>
    <span class="ico" id="pauzeIco">⏸</span>
    <span class="lbl" id="pauzeLbl">Pauze</span>
  </button>
  <button class="mic-btn" id="micBtn" onclick="toggleMic()">🎤</button>
  <button class="zij-knop totaal-knop" onclick="toonTotaal()">
    <span class="ico">＝</span>
    <span class="lbl">Totaal</span>
  </button>
</div>

<div class="status" id="status">Tik op de microfoon en spreek een prijs in</div>
<div class="geen-spraak" id="geenSpraaK">Spraakherkenning werkt niet in deze browser. Gebruik Safari op iPhone of Chrome op Android.</div>

<div class="handmatig">
  <input type="number" id="handInput" placeholder="bijv. 3.50" step="0.01" min="0"
    inputmode="decimal" onkeydown="if(event.key==='Enter')voegHandmatigToe()">
  <button onclick="voegHandmatigToe()">＋</button>
</div>

<div class="lijst-wrap">
  <div class="lijst-header">
    <span>Prijzen</span>
    <button class="wis-alles" onclick="wisAlles()">Alles wissen</button>
  </div>
  <ul class="lijst" id="lijst">
    <li class="leeg-msg" id="leegMsg">Nog geen prijzen toegevoegd</li>
  </ul>
</div>

<!-- Totaal overlay -->
<div class="overlay" id="overlay">
  <div class="overlay-box">
    <div class="overlay-label">Eindtotaal</div>
    <div class="overlay-bedrag" id="ovBedrag"></div>
    <div class="overlay-planten" id="ovPlanten"></div>
    <div class="overlay-rekensom" id="ovRekensom"></div>
    <button class="overlay-sluiten" onclick="sluitOverlay()">Sluiten</button>
  </div>
</div>

<script>
// ─── State ───────────────────────────────────────────────
let posten = [];        // [{bedrag, label, stukprijs, aantal, enkelvoudig}]
let herkenning = null;
let luistert   = false;
let gepauzeerd = false;

// ─── Woordenboeken ────────────────────────────────────────
const W = {
  'nul':0,'een':1,'twee':2,'drie':3,'vier':4,'vijf':5,
  'zes':6,'zeven':7,'acht':8,'negen':9,
  'tien':10,'elf':11,'twaalf':12,'dertien':13,'veertien':14,
  'vijftien':15,'zestien':16,'zeventien':17,'achttien':18,'negentien':19,
  'twintig':20,'dertig':30,'veertig':40,'vijftig':50,
  'zestig':60,'zeventig':70,'tachtig':80,'negentig':90
};

function woord2getal(w) {
  w = w.trim();
  if (/^\d+$/.test(w)) return parseInt(w);
  if (W[w] !== undefined) return W[w];
  // samengesteld: "vijfentwintig", "drieëntwintig"
  for (const [t,tv] of Object.entries(W)) {
    if (tv < 20 || tv % 10 !== 0) continue;
    for (const [e,ev] of Object.entries(W)) {
      if (ev === 0 || ev >= 10) continue;
      if (w === e+'en'+t || w === e+'\u00ebnen'+t) return tv+ev;
    }
  }
  return null;
}

// ─── Prijs parsen ────────────────────────────────────────
// Normaliseert een stuk tekst naar een eurobedrag (float) of null
function parseBedrag(s) {
  // Normaliseer
  s = s.trim().toLowerCase()
    .replace(/[×x]/g, 'x')         // × → x (maar hier niet nodig, al gesplitst)
    .replace(/komma/g, '.')
    .replace(/punt/g, '.')
    .replace(/,/g, '.')
    .replace(/\s+/g, ' ');

  // "3.50" of "3.5"
  let m = s.match(/^(\d+)\.(\d{1,2})$/);
  if (m) return parseFloat(m[1] + '.' + m[2].padEnd(2,'0'));

  // Met "euro": "3 euro", "3 euro vijftig", "drie euro vijftig", "drie euro 50"
  if (s.includes('euro')) {
    const idx = s.indexOf('euro');
    const euroTxt = s.slice(0, idx).trim();
    const centTxt = s.slice(idx + 4).trim();
    const euros = woord2getal(euroTxt);
    if (euros !== null) {
      if (!centTxt) return euros;
      const c = woord2getal(centTxt);
      if (c !== null) {
        // "vijftig"=50→0.50, "vijf"=5→0.05? Nee: "vijf" = 5 cent = 0.05
        // maar "drie euro vijf" is zelden bedoeld als 3.05
        // Aanname: enkelvoudige waarden <=9 zijn tientallen centen (vijf=50ct)
        const cent = c <= 9 ? c * 10 : c;
        return euros + cent / 100;
      }
      // Getal als string: "50"
      if (/^\d{1,2}$/.test(centTxt)) return euros + parseInt(centTxt) / 100;
    }
    return null;
  }

  // Twee woorden zonder euro: "drie vijftig", "3 50"
  const delen = s.split(' ');
  if (delen.length === 2) {
    const a = woord2getal(delen[0]);
    const b = woord2getal(delen[1]);
    if (a !== null && b !== null) {
      const cent = b <= 9 ? b * 10 : b;
      return a + cent / 100;
    }
    // "3 50" (cijfer spatie cijfer, 2 cijfers = centen)
    m = s.match(/^(\d+)\s+(\d{2})$/);
    if (m) return parseFloat(m[1] + '.' + m[2]);
  }

  // Enkel woord/getal
  if (delen.length === 1) {
    const v = woord2getal(s);
    if (v !== null) return v;
  }

  return null;
}

// Hoofdparser: verwerkt volledige Safari-zin
function verwerkZin(zin) {
  // Normaliseer
  let s = zin.toLowerCase().trim()
    .replace(/×/g, 'x')
    .replace(/,/g, '.')
    .replace(/\s+/g, ' ');

  // Totaal-commando?
  const totaalWoorden = ['totaal','klaar','hoeveel','som','eindtotaal','gelijk'];
  if (totaalWoorden.some(w => s.includes(w))) { toonTotaal(); return; }

  // Splits op "plus" voor meerdere prijzen in één zin
  const stukken = s.split(/\s+plus\s+/);
  let aantalVerwerkt = 0;
  let fout = [];

  stukken.forEach(stuk => {
    stuk = stuk.trim();
    if (!stuk) return;

    // Vermenigvuldigen? Zoek naar: getal/woord + (keer|maal|x) + prijs
    // Let op: \bx\b zodat "x" niet matcht in "extra" enz.
    const vm = stuk.match(/^(.+?)\s+(keer|maal|x)\s+(.+)$/i);
    if (vm) {
      const aantalW = vm[1].trim();
      const prijsW  = vm[3].trim();
      const aantal  = woord2getal(aantalW);
      const prijs   = parseBedrag(prijsW);
      if (aantal !== null && aantal > 0 && prijs !== null) {
        voegPost({ bedrag: prijs * aantal, stukprijs: prijs, aantal, enkelvoudig: false });
        aantalVerwerkt++;
        return;
      }
    }

    // Enkelvoudig bedrag
    const bedrag = parseBedrag(stuk);
    if (bedrag !== null && bedrag > 0) {
      voegPost({ bedrag, stukprijs: bedrag, aantal: 1, enkelvoudig: true });
      aantalVerwerkt++;
    } else {
      fout.push(stuk);
    }
  });

  if (aantalVerwerkt === 0) {
    setStatus('Niet herkend: "' + zin + '"');
  } else if (fout.length > 0) {
    setStatus('Niet herkend: "' + fout.join(', ') + '"');
  }
}

// ─── Posten beheer ───────────────────────────────────────
function voegPost(p) {
  p.bedrag = Math.round(p.bedrag * 100) / 100;
  posten.push(p);
  updateUI();
  const toon = p.enkelvoudig
    ? '✓ € ' + fmt(p.bedrag) + ' toegevoegd'
    : '✓ ' + p.aantal + ' × € ' + fmt(p.stukprijs) + ' = € ' + fmt(p.bedrag);
  setStatus(toon);
}

function voegHandmatigToe() {
  const inp = document.getElementById('handInput');
  const val = parseFloat(inp.value.replace(',','.'));
  if (isNaN(val) || val <= 0) { inp.focus(); return; }
  voegPost({ bedrag: val, stukprijs: val, aantal: 1, enkelvoudig: true });
  inp.value = '';
}

function verwijder(i) {
  posten.splice(i, 1);
  updateUI();
}

function wisAlles() {
  if (!posten.length) return;
  if (confirm('Alle prijzen wissen?')) { posten = []; updateUI(); setStatus('Tik op de microfoon en spreek een prijs in'); }
}

// ─── UI update ───────────────────────────────────────────
function fmt(b) { return b.toFixed(2).replace('.', ','); }

function updateUI() {
  const totaal = posten.reduce((s, p) => s + p.bedrag, 0);
  document.getElementById('totaalBedrag').textContent = '€ ' + fmt(totaal);
  document.getElementById('totaalAantal').textContent =
    posten.length + ' ' + (posten.length === 1 ? 'post' : 'posten') + ' ingevoerd';

  const lijst = document.getElementById('lijst');
  if (posten.length === 0) {
    lijst.innerHTML = '<li class="leeg-msg">Nog geen prijzen toegevoegd</li>';
    return;
  }
  lijst.innerHTML = '';
  [...posten].reverse().forEach((p, ri) => {
    const i = posten.length - 1 - ri;
    const li = document.createElement('li');
    if (p.enkelvoudig) {
      li.innerHTML =
        '<span class="li-omschrijving"></span>' +
        '<span class="li-bedrag">€ ' + fmt(p.bedrag) + '</span>' +
        '<button class="li-del" onclick="verwijder(' + i + ')">✕</button>';
    } else {
      li.innerHTML =
        '<span class="li-omschrijving">' + p.aantal + ' × € ' + fmt(p.stukprijs) + '</span>' +
        '<span class="li-bedrag">€ ' + fmt(p.bedrag) + '</span>' +
        '<button class="li-del" onclick="verwijder(' + i + ')">✕</button>';
    }
    lijst.appendChild(li);
  });
}

function setStatus(tekst, actief) {
  const el = document.getElementById('status');
  el.textContent = tekst;
  el.className = 'status' + (actief ? ' actief' : '');
}

// ─── Totaal overlay ──────────────────────────────────────
function toonTotaal() {
  if (!posten.length) { setStatus('Nog geen prijzen ingevoerd.'); return; }
  const totaal = posten.reduce((s, p) => s + p.bedrag, 0);
  const planten = posten.reduce((s, p) => s + p.aantal, 0);
  document.getElementById('ovBedrag').textContent = '€ ' + fmt(totaal);
  document.getElementById('ovPlanten').textContent = planten + ' ' + (planten === 1 ? 'plant' : 'planten');
  const rs = document.getElementById('ovRekensom');
  rs.innerHTML = '';
  posten.forEach(p => {
    const div = document.createElement('div');
    if (p.enkelvoudig) {
      div.innerHTML = '<span>€ ' + fmt(p.stukprijs) + '</span><span></span>';
    } else {
      div.innerHTML = '<span>' + p.aantal + ' × € ' + fmt(p.stukprijs) + '</span><span>€ ' + fmt(p.bedrag) + '</span>';
    }
    rs.appendChild(div);
  });
  document.getElementById('overlay').style.display = 'flex';
}

function sluitOverlay() {
  document.getElementById('overlay').style.display = 'none';
}

// ─── Spraakherkenning ────────────────────────────────────
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;

if (SR) {
  herkenning = new SR();
  herkenning.lang = 'nl-NL';
  herkenning.continuous = true;
  herkenning.interimResults = true;

  herkenning.onresult = (e) => {
    for (let i = e.resultIndex; i < e.results.length; i++) {
      const tekst = e.results[i][0].transcript.trim();
      if (!e.results[i].isFinal) {
        setStatus('🎤 ' + tekst + '…', true);
      } else {
        verwerkZin(tekst);
      }
    }
  };

  herkenning.onerror = (e) => {
    if (e.error === 'no-speech') return;
    setStatus('Fout: ' + e.error);
    stopMic();
  };

  herkenning.onend = () => {
    if (luistert && !gepauzeerd) {
      try { herkenning.start(); } catch(err) {}
    }
  };
} else {
  document.getElementById('geenSpraaK').style.display = 'block';
  document.getElementById('micBtn').style.opacity = '0.4';
  document.getElementById('micBtn').style.pointerEvents = 'none';
}

function toggleMic() {
  if (!herkenning) return;
  if (luistert) { herkenning.stop(); stopMic(); }
  else { startMic(); }
}

function startMic() {
  luistert = true; gepauzeerd = false;
  document.getElementById('micBtn').className = 'mic-btn luistert';
  document.getElementById('micBtn').textContent = '⏹';
  document.getElementById('pauzeBtn').disabled = false;
  setStatus('Luisteren… spreek een prijs in', true);
  try { herkenning.start(); } catch(e) {}
}

function stopMic() {
  luistert = false; gepauzeerd = false;
  document.getElementById('micBtn').className = 'mic-btn';
  document.getElementById('micBtn').textContent = '🎤';
  document.getElementById('pauzeBtn').disabled = true;
  document.getElementById('pauzeIco').textContent = '⏸';
  document.getElementById('pauzeLbl').textContent = 'Pauze';
  setStatus('Tik op de microfoon en spreek een prijs in');
}

function togglePauze() {
  if (!luistert && !gepauzeerd) return;
  if (gepauzeerd) {
    gepauzeerd = false; luistert = true;
    document.getElementById('micBtn').className = 'mic-btn luistert';
    document.getElementById('micBtn').textContent = '⏹';
    document.getElementById('pauzeIco').textContent = '⏸';
    document.getElementById('pauzeLbl').textContent = 'Pauze';
    setStatus('Luisteren… spreek een prijs in', true);
    try { herkenning.start(); } catch(e) {}
  } else {
    gepauzeerd = true; luistert = false;
    try { herkenning.stop(); } catch(e) {}
    document.getElementById('micBtn').className = 'mic-btn gepauzeerd';
    document.getElementById('micBtn').textContent = '⏸';
    document.getElementById('pauzeIco').textContent = '▶️';
    document.getElementById('pauzeLbl').textContent = 'Verder';
    setStatus('Gepauzeerd — tik ▶ om verder te gaan');
  }
}
</script>
</body>
</html>
